name: flutter-android-build-apk

permissions:
  contents: write
  id-token: write
  actions: read

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.2"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: build/app/outputs/flutter-apk/

      - name: Generate release tag
        id: release_tag
        run: |
          echo "tag=v1.0.0-build.${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: release_notes
        run: |
          RECENT_CHANGES=$(git log -5 --pretty=format:"- %s (%h)")

          cat > release_notes.md << EOF
          ## Build Information
          - **Build Number**: ${{ github.run_number }}
          - **Build Date**: ${{ steps.release_tag.outputs.date }}
          - **Commit**: ${{ github.sha }}
          - **Branch**: ${{ github.ref_name }}

          ## Recent Changes
          ${RECENT_CHANGES}

          ## Installation
          Download APK file di bawah dan install ke Android device kamu.

          ## Architecture
          Build ini tersedia dalam 3 varian:
          - **arm64-v8a** — untuk HP modern (disarankan)
          - **armeabi-v7a** — untuk HP lama
          - **x86_64** — untuk emulator
          EOF
          echo "notes_file=release_notes.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.release_tag.outputs.tag }}" \
            build/app/outputs/flutter-apk/*.apk \
            --title "Genshin Import Build #${{ github.run_number }}" \
            --notes-file release_notes.md \
            --target ${{ github.sha }}

      - name: Release Status
        if: steps.create_release.outcome == 'failure'
        run: |
          echo "⚠️  GitHub Release creation failed (kemungkinan permission denied)"
          echo ""
          echo "📦 APK tetap tersedia di Actions artifacts!"
          echo ""
          echo "🔧 Untuk fix:"
          echo "1. Buka: Repository Settings → Actions → General"
          echo "2. Di 'Workflow permissions', pilih 'Read and write permissions'"
          echo "3. Centang 'Allow GitHub Actions to create and approve pull requests'"
          echo "4. Klik Save"
