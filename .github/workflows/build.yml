name: GachaMerch Android APK Build

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build APK and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Flutter env file
        env:
          GOOGLE_SERVER_CLIENT_ID: ${{ secrets.GOOGLE_SERVER_CLIENT_ID }}
        run: |
          if [ -z "$GOOGLE_SERVER_CLIENT_ID" ]; then
            echo "GOOGLE_SERVER_CLIENT_ID secret is required"
            exit 1
          fi

          printf 'GOOGLE_SERVER_CLIENT_ID=%s\n' "$GOOGLE_SERVER_CLIENT_ID" > .env

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.9"
          channel: stable
          cache: true

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/gachamerch-release.keystore

      - name: Create Android signing properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=gachamerch-release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build release APK
        run: flutter build apk --release --split-per-abi --build-number ${{ github.run_number }}

      - name: Build release AAB
        run: flutter build appbundle --release --build-number ${{ github.run_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gachamerch-release-apk
          path: build/app/outputs/flutter-apk/*-release.apk
          retention-days: 14

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: gachamerch-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 14

      - name: Generate release metadata
        id: release_meta
        run: |
          echo "tag=v1.0.0-build.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "date=$(date +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          RECENT_CHANGES=$(git log -5 --pretty=format:"- %s (%h)")

          cat > release_notes.md <<EOF
          ## Build Information
          - Build number: ${{ github.run_number }}
          - Build date: ${{ steps.release_meta.outputs.date }}
          - Commit: ${{ github.sha }}
          - Branch: ${{ github.ref_name }}

          ## Artifacts
          - APK: Android sideload/install builds split per ABI
          - AAB: Google Play upload build

          ## Recent Changes
          $RECENT_CHANGES
          EOF

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.release_meta.outputs.tag }}" \
            build/app/outputs/flutter-apk/*-release.apk \
            build/app/outputs/bundle/release/app-release.aab \
            --title "GachaMerch Build #${{ github.run_number }}" \
            --notes-file release_notes.md \
            --target "${{ github.sha }}"
